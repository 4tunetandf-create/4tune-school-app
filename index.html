<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>4TUNE School App</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<div id="status"></div>

<div id="registerArea" style="display:none;">
  <h3>初回登録</h3>
  <input id="parentName">
  <button onclick="registerParent()">登録</button>
</div>

<div id="homeArea" style="display:none;">

  <input type="date" id="absenceDate">
  <button onclick="sendAbsence()">欠席申請</button>

</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbzjPkLxYBJeBGk9yehLHfUUMhJmQUfxNiaVHyNqjd9MeAqkWOIINjIUBXsxIEpwqa78Mw/exec";

let selectedMembers = [];


// =======================
// 初期処理
// =======================
async function main() {

  try {

    document.getElementById("status").innerHTML = "読み込み中...";

    await liff.init({
      liffId: "2010350476-xCTsckal"
    });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();

    const checkData = await checkParent(profile.userId);

    // 未登録
    if (!checkData.exists) {
      showRegister(profile.userId);
      return;
    }

    // 登録済み
    await loadHome(profile);

  } catch (e) {
    document.getElementById("status").innerHTML = "ERR: " + e.message;
  }

}


// =======================
// 未登録UI
// =======================
function showRegister(lineUserId) {

  document.getElementById("status").innerHTML = `
    <h3>初回登録</h3>
    <p>保護者名を入力してください</p>

    <input id="parentName" placeholder="例：山田太郎">
    <br><br>

    <button onclick="registerParent('${lineUserId}')">
      登録する
    </button>
  `;

}


// =======================
// ホーム
// =======================
async function loadHome(profile) {

  const res = await fetch(
    GAS_URL +
    "?action=getMembersByLineId&lineUserId=" +
    encodeURIComponent(profile.userId)
  );

  const data = await res.json();

  let html = "";

  html += "こんにちは " + profile.displayName + " さん<br><br>";
  html += "<b>登録会員</b><br>";

  for (const member of data.members) {

    html += `
      <div style="margin:6px 0;">
        <button onclick="selectMember('${member.memberId}', '${member.name}')">
          ${member.name}
        </button>
      </div>
    `;

  }

  html += `
    <hr>
    <h3>欠席申請</h3>

    <input type="date" id="absenceDate">
    <br><br>

    <button onclick="sendAbsence()">
      欠席申請
    </button>
  `;

  document.getElementById("status").innerHTML = html;
}


// =======================
// 保護者登録
// =======================
async function registerParent(lineUserId) {

  const name = document.getElementById("parentName").value;

  if (!name) {
    alert("名前を入力してください");
    return;
  }

  await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "createParent",
      lineUserId: lineUserId,
      name: name
    })
  });

  alert("登録完了");
  location.reload();
}


// =======================
// 会員追加（※未使用なら削除OK）
// =======================
async function addMember() {

  const name = document.getElementById("memberName").value;
  const course = document.getElementById("memberCourse").value;

  if (!name) {
    alert("名前を入力してください");
    return;
  }

  const profile = await liff.getProfile();
  const parentId = await getParentId(profile.userId);

  await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "addMember",
      parentId: parentId,
      name: name,
      course: course
    })
  });

  alert("会員を追加しました");
  location.reload();
}


// =======================
// 欠席申請
// =======================
async function sendAbsence() {

  if (selectedMembers.length === 0) {
    alert("会員を選択してください");
    return;
  }

  const date = document.getElementById("absenceDate").value;

  if (!date) {
    alert("日付を選択してください");
    return;
  }

  for (const m of selectedMembers) {

    await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "absenceRequest",
        memberId: m.id,
        memberName: m.name,
        absenceDate: date
      })
    });

  }

  alert("申請完了");
  selectedMembers = [];
}


// =======================
// 会員選択
// =======================
function selectMember(id, name) {

  const exists = selectedMembers.find(m => m.id === id);

  if (exists) {
    selectedMembers = selectedMembers.filter(m => m.id !== id);
  } else {
    selectedMembers.push({ id, name });
  }
}


// =======================
// API
// =======================
async function checkParent(lineUserId) {

  const res = await fetch(
    GAS_URL +
    "?action=getParentByLineId&lineUserId=" +
    encodeURIComponent(lineUserId)
  );

  return await res.json();
}


// =======================
// 起動
// =======================
main();
</script>
</body>
</html>
