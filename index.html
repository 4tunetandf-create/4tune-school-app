<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>4TUNE School App</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<h1>スクール管理アプリ</h1>

<div id="status">
  読み込み中...
</div>

<button onclick="testAbsence()">
欠席申請テスト
</button>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbzjPkLxYBJeBGk9yehLHfUUMhJmQUfxNiaVHyNqjd9MeAqkWOIINjIUBXsxIEpwqa78Mw/exec";

async function main() {

  try {

    document.getElementById("status").innerHTML =
      "LIFF初期化開始";

    await liff.init({
      liffId: "2010350476-xCTsckal"
    });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();

    document.getElementById("status").innerHTML =
      "会員情報取得中...";

    const response = await fetch(
      GAS_URL +
      "?action=getMembersByLineId&lineUserId=" +
      encodeURIComponent(profile.userId)
    );

    const data = await response.json();

    let html = "";

    html += "こんにちは " + profile.displayName + " さん<br><br>";

    html += "<b>登録会員</b><br>";

    for (const member of data.members) {
      html += "・" + member.name + "<br>";
    }

    document.getElementById("status").innerHTML = html;

  } catch(error) {

    document.getElementById("status").innerHTML =
      "ERR : " + error.message;

    console.error(error);

  }

}

async function testAbsence() {

  const response = await fetch(GAS_URL, {

    method: "POST",

    body: JSON.stringify({
      action: "absenceRequest",
      memberId: "MEM001",
      memberName: "テスト会員",
      absenceDate: "2026-06-14"
    })

  });

  const result = await response.json();

  alert("登録完了");

}

main();

</script>

</body>
</html>
