<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>4TUNE School App</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<div id="status"></div>

<div id="registerArea" style="display:none;">
  <h3>初回登録</h3>
  <input id="parentName">
  <button onclick="registerParent()">登録</button>
</div>

<script>
  const GAS_URL =
"https://script.google.com/macros/s/AKfycbzjPkLxYBJeBGk9yehLHfUUMhJmQUfxNiaVHyNqjd9MeAqkWOIINjIUBXsxIEpwqa78Mw/exec";

let selectedMembers = [];
let selectedTransfer = null;

let currentCalendarDate = new Date();

let CACHE = {
  profile: null,
  members: null,
  absences: null,
  transfers: null,
  schedules: null
};
  

// =======================
// 初期処理
// =======================
async function main() {

  try {

    lockUI("読み込み中...");

    await liff.init({
      liffId: "2010350476-xCTsckal"
    });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    CACHE.profile = await liff.getProfile();

    const checkData = await checkParent(CACHE.profile.userId);

    if (!checkData.exists) {
      showRegister(CACHE.profile.userId);
      return;
    }

    await loadHome(CACHE.profile);

  } finally {
    unlockUI();
  }
}
  
// =======================
// 処理中のプロテクト
// =======================
const UI_LOCK = {
  count: 0
};

function lockUI(text = "処理中...") {

  UI_LOCK.count++;

  document.body.style.pointerEvents = "none";
  document.body.style.opacity = "0.6";

  const status = document.getElementById("status");
  if (status) status.innerHTML = text;
}

function unlockUI() {

  UI_LOCK.count = Math.max(0, UI_LOCK.count - 1);

  if (UI_LOCK.count === 0) {
    document.body.style.pointerEvents = "auto";
    document.body.style.opacity = "1";
  }
}

// =======================
// homeに戻る
// =======================
async function returnToHome() {

  const profile = await liff.getProfile();
  await loadHome(profile);

}
  

// =======================
// 未登録UI
// =======================
function showRegister(lineUserId) {

  document.getElementById("status").innerHTML = `
    <h3>初回登録</h3>

    <p>保護者名</p>
    <input id="parentName" placeholder="例：山田太郎">

    <hr>

    <p>お子さま（複数OK）</p>

    <div id="childrenArea">

      <div class="childRow">
        <input class="childName" placeholder="子ども名">
        <input class="childCourse" placeholder="コース">
      </div>

    </div>

    <button onclick="addChildRow()">＋追加</button>

    <br><br>

    <button onclick="registerAll('${lineUserId}')">
      登録する
    </button>
  `;
}
  
function addChildRow() {

  const div = document.createElement("div");

  div.className = "childRow";

  div.innerHTML = `
    <input class="childName" placeholder="子ども名">
    <input class="childCourse" placeholder="コース">
  `;

  document.getElementById("childrenArea").appendChild(div);
}
  
async function registerAll(lineUserId) {

  const parentName = document.getElementById("parentName").value;

  if (!parentName) {
    alert("保護者名を入力してください");
    return;
  }

  // ① 保護者登録
  const parentRes = await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "createParent",
      lineUserId: lineUserId,
      name: parentName
    })
  });

  const parentData = await parentRes.json();
  const parentId = parentData.parentId;

  // ② 子ども取得
  const names = document.querySelectorAll(".childName");
  const courses = document.querySelectorAll(".childCourse");

  let children = [];

  for (let i = 0; i < names.length; i++) {

    const name = names[i].value;

    if (!name) continue;

    children.push({
      name: name,
      course: courses[i].value
    });

  }

  // ③ 会員登録（兄弟分ループ）
  for (const c of children) {

    await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "addMember",
        parentId: parentId,
        name: c.name,
        course: c.course
      })
    });

  }

  alert("登録完了（保護者＋子ども）");
  CACHE.members = null;
  
  location.reload();
}

// =======================
// ホーム
// =======================
async function loadHome(profile) {

  lockUI("会員情報取得中...");

  try {

    // ======================
    // 会員一覧取得
    // ======================
    if (!CACHE.members) {

      const res = await fetch(
        GAS_URL +
        "?action=getMembersByLineId&lineUserId=" +
        encodeURIComponent(profile.userId)
      );

      const data = await res.json();

      CACHE.members = data.members;

    }

    // ======================
    // 欠席一覧取得
    // ======================
    if (!CACHE.absences) {

      const absenceRes = await fetch(
        GAS_URL +
        "?action=getAbsenceList&lineUserId=" +
        encodeURIComponent(profile.userId)
      );

      const absenceData = await absenceRes.json();

      CACHE.absences = absenceData.absences;

    }

    // ======================
    // 振替一覧取得
    // ======================
    if (!CACHE.transfers) {

  const transferRes = await fetch(
    GAS_URL +
    "?action=getTransferList&lineUserId=" +
    encodeURIComponent(profile.userId)
  );

  const transferData = await transferRes.json();

  CACHE.transfers = transferData.transfers;

}

    renderHome(profile);

  } finally {

    unlockUI();

  }

}


// =======================
// 保護者登録
// =======================
async function registerParent(lineUserId) {

  lockUI("登録中...");

  try {

    const name = document.getElementById("parentName").value;

    await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "createParent",
        lineUserId,
        name
      })
    });

    alert("登録完了");
    CACHE.members = null;

    await returnToHome(); // ★初期画面へ

  } finally {
    unlockUI();
  }
}


// =======================
// 会員追加（※未使用なら削除OK）
// =======================
async function addMember() {

  lockUI("登録中...");

  try {

    const name = document.getElementById("memberName").value;
    const course = document.getElementById("memberCourse").value;

    const profile = await liff.getProfile();
    const parentId = await getParentId(profile.userId);

    await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "addMember",
        parentId,
        name,
        course
      })
    });

    alert("登録完了");
    CACHE.members = null;

    await returnToHome(); // ★ここがポイント

  } finally {
    unlockUI();
  }
}


// =======================
// 欠席申請
// =======================
async function sendAbsence() {

  const dateElement =
    document.getElementById("absenceDate");

  if (!dateElement) {
    alert("日付入力欄が見つかりません");
    return;
  }

  const date = dateElement.value;

  if (selectedMembers.length === 0 && !date) {
    alert("会員と日付を選択してください");
    return;
  }

  if (selectedMembers.length === 0) {
    alert("会員を選択してください");
    return;
  }

  if (!date) {
    alert("日付を選択してください");
    return;
  }

  lockUI("申請中...");

  try {

    let messages = [];

    for (const m of selectedMembers) {

      const res = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "absenceRequest",
          memberId: m.id,
          memberName: m.name,
          absenceDate: date
        })
      });

      const result = await res.json();

      if (!result.success) {

        messages.push(
          m.name + "：" + result.message
        );

      } else {

        messages.push(
          m.name + "：申請完了"
        );

      }

    }

    alert(messages.join("\n"));

    selectedMembers = [];
    CACHE.absences = null;

    await returnToHome();

  } finally {

    unlockUI();

  }

}
  
// =======================
// 会員選択
// =======================
function selectMember(id, name) {

  const exists = selectedMembers.find(m => m.id === id);

  if (exists) {
    selectedMembers = selectedMembers.filter(m => m.id !== id);
  } else {
    selectedMembers.push({ id, name });
  }
}


// =======================
// API
// =======================
async function checkParent(lineUserId) {

  const res = await fetch(
    GAS_URL +
    "?action=getParentByLineId&lineUserId=" +
    encodeURIComponent(lineUserId)
  );

  return await res.json();
}

// ======================
// 描写関係
// ======================
function renderHome(profile) {

  let html = "";

  // =====================
  // ヘッダー
  // =====================
  html += `
    <h2>こんにちは ${profile.displayName} さま</h2>
    <hr>
  `;

// =====================
// 欠席エリア（固定順）
// =====================
html += `<h3>欠席</h3>`;

if (!CACHE.absences || CACHE.absences.length === 0) {

  html += `連絡済みの欠席はありません`;

} else {

  // memberIdごとに整理
  const map = {};

  for (const item of CACHE.absences) {

    if (!map[item.memberId]) {
      map[item.memberId] = [];
    }

    map[item.memberId].push(item);
  }

  // ★ここが重要：兄弟順固定（会員マスタ順）
  for (const member of CACHE.members) {

const list = map[member.memberId];

if (!list || list.length === 0) continue;

const sortedList = [...list].sort(
  (a, b) =>
    new Date(a.rawDate) -
    new Date(b.rawDate)
);

    if (!list || list.length === 0) continue;

    html += `<b>${member.name}</b><br>`;

    for (const item of sortedList) {

      let cancelButton = "";

      if (
        item.status === "申請中" ||
        item.status === "振替待ち"
      ) {
        cancelButton = `
          <button onclick="
            cancelAbsence(
              '${item.memberId}',
              '${item.rawDate}'
            )
          ">
            取消
          </button>
        `;
      }

      html += `
        ・${item.absenceDate}
        （${item.status}）
        ${cancelButton}
        <br>
      `;
    }

    html += `<br>`;
  }
}

// =====================
// 振替エリア
// =====================
html += `<h3>振替</h3>`;

if (!CACHE.transfers || CACHE.transfers.length === 0) {

  html += `
    現在表示できる振替情報はありません
  `;

} else {

  const map = {};

  for (const item of CACHE.transfers) {

    if (!map[item.memberId]) {
      map[item.memberId] = [];
    }

    map[item.memberId].push(item);

  }

  // 会員マスタ順固定
for (const member of CACHE.members) {

  const list = map[member.memberId];

  if (!list || list.length === 0) continue;

  const sortedList = [...list].sort(
    (a, b) =>
      new Date(a.rawTransferDate) -
      new Date(b.rawTransferDate)
  );

  html += `<b>${member.name}</b><br>`;

  for (const item of sortedList) {

    let cancelButton = "";

    if (item.status === "申請中") {

      cancelButton = `
        <button onclick="
          cancelTransfer(
            '${item.memberId}',
            '${item.rawAbsenceDate}'
          )
        ">
          取消
        </button>
      `;

    }

    html += `
      欠席：${item.absenceDate}<br>
      ↓<br>
      振替：${item.transferDate}<br>
      （${item.status}）
      ${cancelButton}
      <br><br>
    `;
  }
}

}

html += `<hr>`;

  // =====================
  // 操作ボタン
  // =====================
  html += `
    <button onclick="showSchedule()">スケジュール</button><br>
    <button onclick="showAbsenceForm()">欠席申請</button><br>
    <button onclick="showTransferForm()">振替申請</button>

    <hr>
  `;

  document.getElementById("status").innerHTML = html;

}

function showAbsenceForm() {

  let html = "";

  html += "<h3>欠席申請</h3>";

  html += "<p>対象会員を選択してください</p>";

  for (const member of CACHE.members) {

    const isSelected =
      selectedMembers.some(m => m.id === member.memberId);

    html += `
      <div style="margin:6px 0;">
        <button
          onclick="selectMember('${member.memberId}','${member.name}')"
          style="
            background:${isSelected ? '#4CAF50' : '#ffffff'};
            color:${isSelected ? '#ffffff' : '#000000'};
          "
        >
          ${member.name}
          ${isSelected ? " ✔" : ""}
        </button>
      </div>
    `;
  }

  html += `
    <br>
    <input type="date" id="absenceDate">
    <br><br>

    <button onclick="sendAbsence()">
      申請する
    </button>

    <br><br>

    <button onclick="returnToHome()">
      戻る
    </button>
  `;

  document.getElementById("status").innerHTML = html;
}


// =======================
// 振替画面
// =======================
function showTransferForm() {

  let html = "<h3>振替申請</h3>";

  html += "<p>振替する欠席を選択</p>";

  // =====================
  // 会員ごとに整理
  // =====================
  const map = {};

  for (const item of CACHE.absences) {

    const hasTransfer =
      CACHE.transfers &&
      CACHE.transfers.some(t =>
        t.memberId === item.memberId &&
        t.rawAbsenceDate === item.rawDate
      );

    const canTransfer =
      item.status === "申請中" ||
      (
        item.status === "振替待ち" &&
        !hasTransfer
      );

    if (!canTransfer) continue;

    if (!map[item.memberId]) {
      map[item.memberId] = [];
    }

    map[item.memberId].push(item);

  }

  // =====================
  // 会員マスタ順で表示
  // =====================
  for (const member of CACHE.members) {

    const list = map[member.memberId];

    if (!list || list.length === 0) continue;

    html += `<b>${member.name}</b><br>`;

    for (const item of list) {

      html += `
        <div style="margin:6px 0;">
          <button onclick="selectTransfer(
            '${item.memberId}',
            '${item.memberName}',
            '${item.rawDate}'
          )">
            ${item.absenceDate}
          </button>
        </div>
      `;

    }

    html += `<br>`;

  }

  html += `
    <input type="date" id="transferDate">

    <br><br>

    <button onclick="sendTransfer()">
      申請
    </button>

    <button onclick="returnToHome()">
      戻る
    </button>
  `;

  document.getElementById("status").innerHTML = html;
}

function selectTransfer(memberId, memberName, absenceDate) {

  selectedTransfer = {
    memberId,
    memberName,
    absenceDate
  };

}

async function sendTransfer() {

  const date = document.getElementById("transferDate").value;

  if (!selectedTransfer || !date) {
    alert("未選択です");
    return;
  }

await fetch(GAS_URL, {
  method: "POST",
  body: JSON.stringify({
    action: "transferRequest",
    memberId: selectedTransfer.memberId,
    memberName: selectedTransfer.memberName,
    absenceDate: selectedTransfer.absenceDate,
    transferDate: date
  })
});

CACHE.absences = null;
CACHE.transfers = null;

selectedTransfer = null;

await returnToHome();
}

// =======================
// 取り消し
// =======================
// 欠席
async function cancelAbsence(memberId, absenceDate) {

  if (!confirm("欠席を取り消しますか？")) {
    return;
  }

  await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "changeRequestStatus",
      memberId: memberId,
      absenceDate: absenceDate,
      status: "取消"
    })
  });

  CACHE.absences = null;

  await returnToHome();

}
//振替
async function cancelTransfer(
  memberId,
  absenceDate
) {

  if (
    !confirm("振替申請を取り消しますか？")
  ) {
    return;
  }

  await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "cancelTransfer",
      memberId: memberId,
      absenceDate: absenceDate
    })
  });

  CACHE.absences = null;
  CACHE.transfers = null;

  await returnToHome();

}

// =======================
// スケジュール管理
// =======================
async function loadSchedule() {

  const url =
    GAS_URL +
    "?action=getScheduleByLineId" +
    "&lineUserId=" +
    encodeURIComponent(
      CACHE.profile.userId
    );

const res = await fetch(
  GAS_URL +
  "?action=getScheduleByLineId" +
  "&lineUserId=" +
  encodeURIComponent(
    CACHE.profile.userId
  )
);

  const data = await res.json();

  CACHE.schedules = data.schedules;

}

// スケジュール管理
async function showSchedule() {

  await loadSchedule();

let html = "";
  
  const today = new Date();

  const year =
    currentCalendarDate.getFullYear();

  const month =
    currentCalendarDate.getMonth();

  html += `
  <div style="
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  ">

    <button onclick="prevMonth()">
      ◀
    </button>

    <h3>
      ${year}年${month + 1}月
    </h3>

    <button onclick="nextMonth()">
      ▶
    </button>

  </div>
`;

  const firstDay =
    new Date(year, month, 1);

  const lastDay =
    new Date(year, month + 1, 0);

  const startWeek =
    firstDay.getDay();

  const totalDays =
    lastDay.getDate();

  html += `
    <table
      border="1"
      style="
        width:100%;
        border-collapse:collapse;
        text-align:center;
      "
    >
      <tr>
        <th>日</th>
        <th>月</th>
        <th>火</th>
        <th>水</th>
        <th>木</th>
        <th>金</th>
        <th>土</th>
      </tr>
      <tr>
  `;

  let cellCount = 0;

  for (let i = 0; i < startWeek; i++) {

    html += `<td></td>`;
    cellCount++;

  }

  for (let day = 1; day <= totalDays; day++) {

    const dateStr =
      `${year}/${String(month + 1).padStart(2, "0")}/${String(day).padStart(2, "0")}`;

    const schedules =
      CACHE.schedules.filter(
        s => s.date === dateStr
      );

    let mark = "";

    if (schedules.length > 0) {

      const type =
        schedules[0].type;

      if (type === "通常") mark = "●";
      else if (type === "振替可") mark = "★";
      else if (type === "雨天") mark = "▲";
      else if (type === "休講") mark = "■";

    }

    html += `
      <td
        style="
          height:70px;
          vertical-align:top;
          cursor:pointer;
        "
        onclick="showScheduleDetail('${dateStr}')"
      >
        ${day}<br>
        ${mark}
      </td>
    `;

    cellCount++;

    if (cellCount % 7 === 0) {

      html += `</tr><tr>`;

    }

  }

  while (cellCount % 7 !== 0) {

    html += `<td></td>`;
    cellCount++;

  }

  html += `
      </tr>
    </table>

    <br>

    <button onclick="returnToHome()">
      戻る
    </button>
  `;

  document.getElementById("status").innerHTML =
    html;

}

function showScheduleDetail(dateStr) {

  const schedules =
    CACHE.schedules.filter(
      s => s.date === dateStr
    );

  if (schedules.length === 0) {
    return;
  }

  let html = `
    <h3>${dateStr}</h3>
  `;

  for (const item of schedules) {

    html += `

      <hr>

      <p>
        <b>${item.className}</b>
      </p>

      <p>
        ${item.startTime}
        ～
        ${item.endTime}
      </p>

      <p>
        ${item.place}
      </p>

      <p>
        ${item.type}
      </p>

    `;
  }

  html += `
    <button onclick="closeScheduleModal()">
      閉じる
    </button>
  `;

  document.getElementById(
    "scheduleModalContent"
  ).innerHTML = html;

  document.getElementById(
    "scheduleModal"
  ).style.display = "block";

}

function closeScheduleModal() {

  document.getElementById(
    "scheduleModal"
  ).style.display = "none";

}

function prevMonth() {

  currentCalendarDate.setMonth(
    currentCalendarDate.getMonth() - 1
  );

  showSchedule();

}

function nextMonth() {

  currentCalendarDate.setMonth(
    currentCalendarDate.getMonth() + 1
  );

  showSchedule();

}
  
// =======================
// 起動
// =======================
main();
</script>
<div
  id="scheduleModal"
  style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:999;
  "
>
  <div
    id="scheduleModalContent"
    style="
      background:white;
      width:80%;
      max-width:400px;
      margin:100px auto;
      padding:20px;
      border-radius:10px;
    "
  >
  </div>
</div>
</body>
</html>
