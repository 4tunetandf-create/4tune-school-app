<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>4TUNE School App</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<h1>スクール管理アプリ</h1>

<div id="status">
  読み込み中...
</div>

<script>

async function main() {

  try {

    document.getElementById("status").innerHTML =
      "LIFF初期化開始";

    await liff.init({
      liffId: "2010350476-xCTsckal"
    });

    const profile = await liff.getProfile();

    document.getElementById("status").innerHTML =
      "こんにちは " + profile.displayName + " さん<br><br>" +
      "LINE ID:<br>" +
      profile.userId;

  } catch(error) {

    document.getElementById("status").innerHTML =
      "ERR : " + error.message;

  }

}

main();

</script>

</body>
</html>
