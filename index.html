<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>4TUNE School App</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<h1>スクール管理アプリ</h1>

<div id="status">読み込み中...</div>

<input type="date" id="absenceDate">
<br><br>

<button onclick="sendAbsence()">
欠席申請
</button>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbzjPkLxYBJeBGk9yehLHfUUMhJmQUfxNiaVHyNqjd9MeAqkWOIINjIUBXsxIEpwqa78Mw/exec";

let selectedMember = null;

async function main() {

  try {

    document.getElementById("status").innerHTML =
      "LIFF初期化開始";

    await liff.init({
      liffId: "2010350476-xCTsckal"
    });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();

    document.getElementById("status").innerHTML =
      "会員情報取得中...";

    const response = await fetch(
      GAS_URL +
      "?action=getMembersByLineId&lineUserId=" +
      encodeURIComponent(profile.userId)
    );

    const data = await response.json();

    let html = "";

    html += "こんにちは " + profile.displayName + " さん<br><br>";
    html += "<b>登録会員</b><br>";

    for (const member of data.members) {

      html += `
        <div style="margin:6px 0;">
          <button onclick="selectMember('${member.memberId}', '${member.name}')">
            ${member.name}
          </button>
        </div>
      `;

    }

    document.getElementById("status").innerHTML = html;

  } catch (error) {

    document.getElementById("status").innerHTML =
      "ERR : " + error.message;

    console.error(error);

  }

}

function selectMember(id, name) {

  selectedMember = { id, name };

  document.getElementById("status").innerHTML +=
    "<br><br>選択中: " + name;

}

async function sendAbsence() {

  if (!selectedMember) {
    alert("会員を選択してください");
    return;
  }

  const date = document.getElementById("absenceDate").value;

  if (!date) {
    alert("日付を選択してください");
    return;
  }

  const response = await fetch(GAS_URL, {

    method: "POST",

    body: JSON.stringify({
      action: "absenceRequest",
      memberId: selectedMember.id,
      memberName: selectedMember.name,
      absenceDate: date
    })

  });

  await response.json();

  alert("申請完了");

  selectedMember = null;

}

main();

</script>

</body>
</html>
