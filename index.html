<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>4TUNE School App</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<div id="status"></div>

<div id="registerArea" style="display:none;">
  <h3>初回登録</h3>
  <input id="parentName">
  <button onclick="registerParent()">登録</button>
</div>

<div id="homeArea" style="display:none;">

  <input type="date" id="absenceDate">
  <button onclick="sendAbsence()">欠席申請</button>

</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbzjPkLxYBJeBGk9yehLHfUUMhJmQUfxNiaVHyNqjd9MeAqkWOIINjIUBXsxIEpwqa78Mw/exec";

let selectedMembers = [];


// =======================
// 初期処理
// =======================
async function main() {

  try {

    document.getElementById("status").innerHTML = "読み込み中...";

    await liff.init({
      liffId: "2010350476-xCTsckal"
    });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();

    const checkData = await checkParent(profile.userId);

    // 未登録
    if (!checkData.exists) {
      showRegister(profile.userId);
      return;
    }

    // 登録済み
    await loadHome(profile);

  } catch (e) {
    document.getElementById("status").innerHTML = "ERR: " + e.message;
  }

}
// =======================
// 処理中のプロテクト
// =======================
const UI_LOCK = {
  count: 0
};

function lockUI(text = "処理中...") {

  UI_LOCK.count++;

  document.body.style.pointerEvents = "none";
  document.body.style.opacity = "0.6";

  const status = document.getElementById("status");
  if (status) status.innerHTML = text;
}

function unlockUI() {

  UI_LOCK.count = Math.max(0, UI_LOCK.count - 1);

  if (UI_LOCK.count === 0) {
    document.body.style.pointerEvents = "auto";
    document.body.style.opacity = "1";
  }
}
  

// =======================
// 未登録UI
// =======================
function showRegister(lineUserId) {

  document.getElementById("status").innerHTML = `
    <h3>初回登録</h3>

    <p>保護者名</p>
    <input id="parentName" placeholder="例：山田太郎">

    <hr>

    <p>お子さま（複数OK）</p>

    <div id="childrenArea">

      <div class="childRow">
        <input class="childName" placeholder="子ども名">
        <input class="childCourse" placeholder="コース">
      </div>

    </div>

    <button onclick="addChildRow()">＋追加</button>

    <br><br>

    <button onclick="registerAll('${lineUserId}')">
      登録する
    </button>
  `;
}
function addChildRow() {

  const div = document.createElement("div");

  div.className = "childRow";

  div.innerHTML = `
    <input class="childName" placeholder="子ども名">
    <input class="childCourse" placeholder="コース">
  `;

  document.getElementById("childrenArea").appendChild(div);
}
async function registerAll(lineUserId) {

  const parentName = document.getElementById("parentName").value;

  if (!parentName) {
    alert("保護者名を入力してください");
    return;
  }

  // ① 保護者登録
  const parentRes = await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "createParent",
      lineUserId: lineUserId,
      name: parentName
    })
  });

  const parentData = await parentRes.json();
  const parentId = parentData.parentId;

  // ② 子ども取得
  const names = document.querySelectorAll(".childName");
  const courses = document.querySelectorAll(".childCourse");

  let children = [];

  for (let i = 0; i < names.length; i++) {

    const name = names[i].value;

    if (!name) continue;

    children.push({
      name: name,
      course: courses[i].value
    });

  }

  // ③ 会員登録（兄弟分ループ）
  for (const c of children) {

    await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "addMember",
        parentId: parentId,
        name: c.name,
        course: c.course
      })
    });

  }

  alert("登録完了（保護者＋子ども）");

  location.reload();
}

// =======================
// ホーム
// =======================
async function loadHome(profile) {

  const res = await fetch(
    GAS_URL +
    "?action=getMembersByLineId&lineUserId=" +
    encodeURIComponent(profile.userId)
  );

  const data = await res.json();

  let html = "";

  html += "こんにちは " + profile.displayName + " さん<br><br>";
  html += "<b>登録会員</b><br>";

  for (const member of data.members) {

    html += `
      <div style="margin:6px 0;">
        <button onclick="selectMember('${member.memberId}', '${member.name}')">
          ${member.name}
        </button>
      </div>
    `;

  }

  html += `
    <hr>
    <h3>欠席申請</h3>

    <input type="date" id="absenceDate">
    <br><br>

    <button onclick="sendAbsence()">
      欠席申請
    </button>
  `;

  document.getElementById("status").innerHTML = html;
}


// =======================
// 保護者登録
// =======================
async function registerParent(lineUserId) {

  const name = document.getElementById("parentName").value;

  if (!name) {
    alert("名前を入力してください");
    return;
  }

  await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "createParent",
      lineUserId: lineUserId,
      name: name
    })
  });

  alert("登録完了");
  location.reload();
}


// =======================
// 会員追加（※未使用なら削除OK）
// =======================
async function addMember() {

  lockUI("会員登録中...");

  try {

    const name = document.getElementById("memberName").value;
    const course = document.getElementById("memberCourse").value;

    const profile = await liff.getProfile();
    const parentId = await getParentId(profile.userId);

    await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "addMember",
        parentId,
        name,
        course
      })
    });

    alert("完了");
    location.reload();

  } finally {
    unlockUI();
  }
}


// =======================
// 欠席申請
// =======================
async function sendAbsence() {

  lockUI("申請中...");

  try {

    for (const m of selectedMembers) {

      await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "absenceRequest",
          memberId: m.id,
          memberName: m.name,
          absenceDate: document.getElementById("absenceDate").value
        })
      });

    }

    alert("申請完了");
    selectedMembers = [];

  } finally {
    unlockUI();
  }
}


// =======================
// 会員選択
// =======================
function selectMember(id, name) {

  const exists = selectedMembers.find(m => m.id === id);

  if (exists) {
    selectedMembers = selectedMembers.filter(m => m.id !== id);
  } else {
    selectedMembers.push({ id, name });
  }
}


// =======================
// API
// =======================
async function checkParent(lineUserId) {

  const res = await fetch(
    GAS_URL +
    "?action=getParentByLineId&lineUserId=" +
    encodeURIComponent(lineUserId)
  );

  return await res.json();
}


// =======================
// 起動
// =======================
main();
</script>
</body>
</html>
