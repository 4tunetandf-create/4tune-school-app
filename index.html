<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>4TUNE School App</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<h1>スクール管理アプリ</h1>

<div id="status">読み込み中...</div>

<input type="date" id="absenceDate">
<br><br>

<button onclick="sendAbsence()">
欠席申請
</button>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbzjPkLxYBJeBGk9yehLHfUUMhJmQUfxNiaVHyNqjd9MeAqkWOIINjIUBXsxIEpwqa78Mw/exec";

let selectedMembers = [];

async function main() {

  try {

    document.getElementById("status").innerHTML =
      "LIFF初期化開始";

    await liff.init({
      liffId: "2010350476-xCTsckal"
    });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();

    // 保護者存在チェック（追加）
    const checkRes = await fetch(
      GAS_URL +
      "?action=getParentByLineId&lineUserId=" +
      encodeURIComponent(profile.userId)
    );

    const checkData = await checkRes.json();

    // 未登録 → 登録画面
    if (!checkData.exists) {

      document.getElementById("status").innerHTML = `
        <h3>初回登録</h3>
        <p>保護者名を入力してください</p>
        <input id="parentName" placeholder="例：山田太郎">
        <br><br>
        <button onclick="registerParent('${profile.userId}')">
          登録する
        </button>
      `;

      return;
    }

    // 登録済み → ホーム画面
    loadHome(profile);

  } catch (error) {

    document.getElementById("status").innerHTML =
      "ERR : " + error.message;

    console.error(error);

  }

}

// ホーム画面
async function loadHome(profile) {

  document.getElementById("status").innerHTML =
    "会員情報取得中...";

  const response = await fetch(
    GAS_URL +
    "?action=getMembersByLineId&lineUserId=" +
    encodeURIComponent(profile.userId)
  );

  const data = await response.json();

  let html = "";

  html += "こんにちは " + profile.displayName + " さん<br><br>";
  html += "<b>登録会員</b><br>";

  for (const member of data.members) {

    html += `
      <div style="margin:6px 0;">
        <button onclick="selectMember('${member.memberId}', '${member.name}')">
          ${member.name}
        </button>
      </div>
    `;

  }

  document.getElementById("status").innerHTML = html;

}

// 初回登録
async function registerParent(lineUserId) {

  const name = document.getElementById("parentName").value;

  if (!name) {
    alert("名前を入力してください");
    return;
  }

  await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "createParent",
      lineUserId: lineUserId,
      name: name
    })
  });

  alert("登録完了");

  location.reload();

}

// 会員選択（複数対応）
function selectMember(id, name) {

  const exists = selectedMembers.find(m => m.id === id);

  if (exists) {
    selectedMembers = selectedMembers.filter(m => m.id !== id);
  } else {
    selectedMembers.push({ id, name });
  }

}

// 欠席申請
async function sendAbsence() {

  if (selectedMembers.length === 0) {
    alert("会員を選択してください");
    return;
  }

  const date = document.getElementById("absenceDate").value;

  if (!date) {
    alert("日付を選択してください");
    return;
  }

  for (const m of selectedMembers) {

    await fetch(GAS_URL, {

      method: "POST",

      body: JSON.stringify({
        action: "absenceRequest",
        memberId: m.id,
        memberName: m.name,
        absenceDate: date
      })

    });

  }

  alert("申請完了");

  selectedMembers = [];

}

main();

</script>
</body>
</html>
